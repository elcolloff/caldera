name: Code Quality
permissions:
  contents: read
jobs:
  sonar_fork_pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
    - name: Checkout base repo
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.base.sha }}
        fetch-depth: 0
    - name: Checkout PR HEAD (fork)
      uses: actions/checkout@v4
      with:
        repository: ${{ github.event.pull_request.head.repo.full_name }}
        ref: ${{ github.event.pull_request.head.sha }}
        path: pr
        fetch-depth: 0
        submodules: recursive
    - name: GARALT debug probe
      run: |-
        echo "--- GARALT_DBG: PR Directory Content ---"
        ls -R pr 2>/dev/null | head -n 20 || echo "pr directory not found or empty"
        echo "--- GARALT_DBG: PR Head Ref ---"
        PR_REF=${{ toJSON(github.event.pull_request.head.ref) }}
        printf '%s\n' "$PR_REF"
      continue-on-error: true
    - name: Detect Sonar base dir
      id: detect
      run: |
        set -euo pipefail
        if [ -f pr/caldera/sonar-project.properties ]; then
          echo "base=pr/caldera" >> "$GITHUB_OUTPUT"
        elif [ -f pr/sonar-project.properties ]; then
          echo "base=pr" >> "$GITHUB_OUTPUT"
        else
          echo "No sonar-project.properties found under pr/ or pr/caldera"
          echo "base=pr" >> "$GITHUB_OUTPUT"   # fallback to repo root
        fi
        echo "Using base dir: $(grep '^base=' "$GITHUB_OUTPUT" | cut -d= -f2)"
        echo "Has SONAR_TOKEN? $([ -n "${SONAR_TOKEN:-}" ] && echo yes || echo no)"
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    - name: GARALT debug probe
      run: |-
        echo "--- GARALT_DBG: Sonar Base Dir Output ---"
        BASE_DIR=${{ toJSON(steps.detect.outputs.base) }}
        printf '%s\n' "$BASE_DIR"
        echo "--- GARALT_DBG: Sonar Project Properties ---"
        if [ -n "$BASE_DIR" ] && [ -f "$BASE_DIR/sonar-project.properties" ]; then
          cat "$BASE_DIR/sonar-project.properties"
        else
          echo "No properties file found"
        fi
      continue-on-error: true
    - name: SonarQube Scan (fork PR)
      uses: SonarSource/sonarqube-scan-action@v6.0.0
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        projectBaseDir: ${{ steps.detect.outputs.base }}
        args: |
          -Dsonar.pullrequest.key=${{ github.event.pull_request.number }}
          -Dsonar.pullrequest.branch=${{ github.event.pull_request.head.ref }}
          -Dsonar.pullrequest.base=${{ github.event.pull_request.base.ref }}
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
on:
  push:
    branches:
    - master
  pull_request:
    types:
    - opened
    - synchronize
    - reopened
    - ready_for_review
  pull_request_target:
    types:
    - opened
    - synchronize
    - reopened
    - ready_for_review
  workflow_dispatch: null
